name: Setup Template
on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

concurrency:
  group: template-setup-${{ github.repository_id }}
  cancel-in-progress: true

jobs:
  setup:
    # Only run if this is a newly generated repository from the template
    if: ${{ github.repository != 'jmbish04/core-template-cfw-assets-astro-shadcn' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Update repository details and dependencies
        env:
          BRANCH_NAME: ${{ github.ref_name }}
          REPO_NAME: ${{ github.event.repository.name }}
          REPO_SLUG: ${{ github.repository }}
        run: |
          # Check if the setup has already been run
          if ! grep -q '"name": "core-template-cfw-assets-astro-shadcn"' package.json; then
            echo "Project already set up."
            exit 0
          fi

          echo "Setting up new project from template: $REPO_NAME"

          # Update package.json metadata for the new repository
          npm pkg set name="$REPO_NAME"
          npm pkg set repository.url="https://github.com/$REPO_SLUG.git"

          # Update wrangler.jsonc (replaces worker name and d1 database_name)
          sed -i "s/core-template-cfw-assets-astro-shadcn/$REPO_NAME/g" wrangler.jsonc

          # Enforce pnpm-only dependency maintenance and refresh generated files
          rm -f package-lock.json
          pnpm run deps:update

          # Remove this setup workflow so it doesn't run again or stay in the new repo
          rm -f .github/workflows/setup-template.yml

          # Commit the changes
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json pnpm-lock.yaml worker-configuration.d.ts wrangler.jsonc .github/workflows/setup-template.yml

          if git diff --cached --quiet; then
            echo "No setup changes to commit."
            exit 0
          fi

          git commit -m "chore: initialize template repository"
          git pull --rebase origin "$BRANCH_NAME"
          git push origin "HEAD:$BRANCH_NAME"
