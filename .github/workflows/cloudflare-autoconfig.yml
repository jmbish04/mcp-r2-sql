name: Cloudflare Workers Builds Autoconfig

on:
  push:
    branches:
      - main
  workflow_dispatch:      

permissions:
  contents: read

jobs:
  configure-ci-cd:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Python Context
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run Autoconfig Script
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
        run: python .github/scripts/configure_builds.py
